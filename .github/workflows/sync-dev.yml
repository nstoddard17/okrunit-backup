name: Sync dev after merge

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  sync-dev:
    name: Reset dev to main
    runs-on: ubuntu-latest
    if: github.event.pull_request.merged == true && github.event.pull_request.head.ref == 'dev'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fast-forward dev to main
        run: |
          git fetch origin main dev
          MAIN_SHA=$(git rev-parse origin/main)
          DEV_SHA=$(git rev-parse origin/dev)
          MERGE_BASE=$(git merge-base origin/main origin/dev)

          # Only reset dev if it hasn't received new commits since the PR
          # was created (i.e. dev's tip is an ancestor of main after squash)
          if git merge-base --is-ancestor origin/dev origin/main 2>/dev/null; then
            git push origin main:dev --force
            echo "dev branch reset to main ($MAIN_SHA)"
          else
            echo "dev has new commits beyond what was merged — skipping reset"
            echo "  main: $MAIN_SHA"
            echo "  dev:  $DEV_SHA"
            echo "  base: $MERGE_BASE"
          fi
