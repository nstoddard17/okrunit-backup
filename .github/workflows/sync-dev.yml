name: Sync dev with main

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  sync:
    name: Fast-forward dev to main
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.BACKUP_REPO_TOKEN }}

      - name: Sync dev branch
        run: |
          git fetch origin dev || exit 0
          git checkout dev
          git merge origin/main --ff-only || git reset --hard origin/main
          git push origin dev
