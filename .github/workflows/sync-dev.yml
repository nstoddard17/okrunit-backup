name: Sync dev with main

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  sync:
    name: Fast-forward dev to main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync dev branch
        run: |
          git fetch origin dev || exit 0
          git checkout dev
          git merge origin/main --ff-only || git reset --hard origin/main
          git push origin dev
