name: Backup Mirror

on:
  # Run after CI completes on any branch (catches direct pushes to main)
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  # Run on a schedule as a fallback (auto-merges via GITHUB_TOKEN
  # don't trigger push/workflow_run events)
  schedule:
    - cron: "*/15 * * * *"

jobs:
  backup:
    name: Backup Mirror
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Push main to backup repo
        env:
          BACKUP_TOKEN: ${{ secrets.BACKUP_REPO_TOKEN }}
        run: |
          if [ -z "$BACKUP_TOKEN" ]; then
            echo "::warning::BACKUP_REPO_TOKEN secret not set — skipping mirror."
            exit 0
          fi
          git remote add backup https://x-access-token:${BACKUP_TOKEN}@github.com/nstoddard17/okrunit-backup.git
          git push backup main
