<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 180" fill="none">
  <!-- Chart background -->
  <rect x="35" y="25" width="170" height="130" rx="12" fill="#fff" stroke="#c8e6c9" stroke-width="2"/>
  <!-- Grid lines -->
  <line x1="55" y1="55" x2="185" y2="55" stroke="#f1f8e9" stroke-width="1"/>
  <line x1="55" y1="80" x2="185" y2="80" stroke="#f1f8e9" stroke-width="1"/>
  <line x1="55" y1="105" x2="185" y2="105" stroke="#f1f8e9" stroke-width="1"/>
  <!-- Bars -->
  <rect x="62" y="70" width="20" height="55" rx="4" fill="#4caf50"/>
  <rect x="90" y="50" width="20" height="75" rx="4" fill="#388e3c"/>
  <rect x="118" y="60" width="20" height="65" rx="4" fill="#4caf50"/>
  <rect x="146" y="85" width="20" height="40" rx="4" fill="#66bb6a"/>
  <!-- Warning bar -->
  <rect x="174" y="42" width="2" height="0" rx="0" fill="none"/>
  <!-- Alert indicator -->
  <circle cx="185" cy="35" r="16" fill="#ff9800"/>
  <circle cx="185" cy="35" r="12" fill="#fff"/>
  <text x="185" y="40" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="#ff9800">!</text>
  <!-- Trend arrow -->
  <path d="M62 45 L90 38 L118 42 L146 50" stroke="#c8e6c9" stroke-width="2" stroke-linecap="round" fill="none"/>
</svg>
